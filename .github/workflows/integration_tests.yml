name: Integration Tests CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run-online-tests:
        description: "Run tests that call external LLM APIs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  changed_files:
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.check-changes.outputs.python_changed }}
      js_changed: ${{ steps.check-changes.outputs.js_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for diff with main branch

      - name: Check for file changes
        id: check-changes
        run: |
          if git diff --name-only origin/main HEAD | grep -E "^python/.*\.py$"; then
            echo "python_changed=true" >> $GITHUB_OUTPUT
          else
            echo "python_changed=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only origin/main HEAD | grep -E "^js/.*\.(js|ts|jsx|tsx)$"; then
            echo "js_changed=true" >> $GITHUB_OUTPUT
          else
            echo "js_changed=false" >> $GITHUB_OUTPUT
          fi

  python_integration_test:
    name: Python Integration Test (${{ matrix.python-version }})
    needs: changed_files
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'release') ||
        needs.changed_files.outputs.python_changed == 'true'
      )) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.2"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev
        shell: bash
        working-directory: python
          
      - name: Run offline Python tests
        env:
          LANGSMITH_TEST_TRACKING: "false"
        run: >-
          uv run pytest tests
          --ignore=tests/test_trajectory_llm.py
          --ignore=tests/test_trajectory_llm_async.py
          --ignore=tests/graph_trajectory/test_graph_trajectory_llm.py
          --ignore=tests/graph_trajectory/test_graph_trajectory_llm_async.py
          --ignore=tests/graph_trajectory/test_graph_trajectory_strict.py
          --ignore=tests/graph_trajectory/test_graph_trajectory_strict_async.py
        shell: bash
        working-directory: python

      - name: Run online Python tests
        if: github.event_name == 'workflow_dispatch' && inputs.run-online-tests
        env:
          LANGSMITH_TRACING: "true"
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: >-
          uv run pytest
          tests/test_trajectory_llm.py
          tests/test_trajectory_llm_async.py
          tests/graph_trajectory/test_graph_trajectory_llm.py
          tests/graph_trajectory/test_graph_trajectory_llm_async.py
          tests/graph_trajectory/test_graph_trajectory_strict.py
          tests/graph_trajectory/test_graph_trajectory_strict_async.py
        shell: bash
        working-directory: python

  js_integration_test:
    name: JS Integration Test
    needs: changed_files
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'release') ||
        needs.changed_files.outputs.js_changed == 'true'
      )) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Yarn
        run: corepack enable && corepack prepare yarn@3.5.1 --activate

      - name: Install Yarn dependencies
        run: yarn install --immutable
        shell: bash
        working-directory: js


      - name: Run offline JS tests
        env:
          LANGSMITH_TEST_TRACKING: "false"
        run: >-
          yarn test src/trajectory/tests src/graph_trajectory/tests
          --exclude "**/*llm*.test.ts"
        shell: bash
        working-directory: js

      - name: Run online JS tests
        if: github.event_name == 'workflow_dispatch' && inputs.run-online-tests
        env:
          LANGSMITH_TRACING: "true"
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: yarn test src/trajectory/tests src/graph_trajectory/tests
        shell: bash
        working-directory: js
